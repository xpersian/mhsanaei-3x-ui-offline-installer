name: Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'
      is_prerelease:
        description: 'Mark as Pre-release'
        type: boolean
        required: true
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: xui-offline-builder-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: xui-offline-builder-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: xui-offline-builder-macos

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Update Version in Cargo.toml
        shell: bash
        run: |
          # Strip 'v' prefix if present
          CLEAN_VERSION=$(echo "${{ github.event.inputs.version || '0.1.0' }}" | sed 's/^v//')
          sed -i "s/^version = \".*\"/version = \"$CLEAN_VERSION\"/" Cargo.toml

      - run: cargo build --release --target ${{ matrix.target }}

      - shell: bash
        run: |
          mkdir -p assets
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/xui-offline-builder.exe assets/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/xui-offline-builder assets/${{ matrix.artifact_name }}
          fi

      - name: Create Git Tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease == 'false' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - id: commit_msg
        shell: bash
        run: |
          msg=$(git log -1 --pretty=%B | head -n 1)
          echo "message=$msg" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: assets/*
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ${{ steps.commit_msg.outputs.message }}
            
            ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: ${{ github.event.inputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}