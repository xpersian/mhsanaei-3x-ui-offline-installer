name: Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: xui-offline-builder-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: xui-offline-builder-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: xui-offline-builder-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p assets
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/xui-offline-builder.exe assets/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/xui-offline-builder assets/${{ matrix.artifact_name }}
          fi

      - name: Get Latest Commit Message
        id: commit_msg
        shell: bash
        run: |
          msg=$(git log -1 --pretty=%B | head -n 1)
          echo "message=$msg" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: assets/*
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body: |
            Automatically generated release.
            
            **Latest Changes:**
            ${{ steps.commit_msg.outputs.message }}
            
            **Version:** ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
